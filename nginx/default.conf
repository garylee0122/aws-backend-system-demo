# ==============================================================================
# 新版設定：強制 HTTP 轉 HTTPS 暨 SSL 加密反向代理
# ==============================================================================

# ==========================================
# 1. HTTP → HTTPS 強制轉址區塊
# ==========================================
server {
    # 監聽 80 埠（標準的不加密 HTTP 協定埠）
    listen 80;
    
    # 綁定你的免費網域，只有當請求的 Domain 符合時才由這個區塊處理
    server_name gary-demo.duckdns.org;

    # 使用 301 永久轉址（Moved Permanently），將所有 HTTP 請求強制重定向至 HTTPS 相同網址
    # $host 代表當前域名，$request_uri 代表網域後面的路徑與參數
    return 301 https://$host$request_uri;
}

# ==========================================
# 2. HTTPS 主要服務區塊
# ==========================================
server {
    # 監聽 443 埠並啟用 SSL 加密連線
    listen 443 ssl;
    
    # 綁定你的免費網域
    server_name gary-demo.duckdns.org;

    # ==========================================
    # SSL 憑證路徑設定（由 Certbot 申請並透過 Docker 掛載進來的路徑）
    # ==========================================
    # 公鑰與憑證鏈路徑
    ssl_certificate /etc/letsencrypt/live/gary-demo.duckdns.org/fullchain.pem;
    # 私鑰路徑
    ssl_certificate_key /etc/letsencrypt/live/gary-demo.duckdns.org/privkey.pem;

    # 限定使用的 TLS 加密協定版本，停用安全性較低的老舊版本（如 TLSv1.0/1.1），符合現代業界資安標準
    ssl_protocols TLSv1.2 TLSv1.3;

    # ==========================================
    # 專案根目錄與預設首頁
    # ==========================================
    # 設定專案根目錄，指向 Nginx 容器內部的 Laravel public 資料夾
    root /var/www/public;

    # 當請求的是目錄時，依序尋找並作為首頁讀取的檔案名稱
    index index.php index.html;

    # ==========================================
    # Laravel API 分流區塊
    # https://gary-demo.duckdns.org/laravel-api/*
    # ==========================================
    location /laravel-api/ {
        # 嘗試尋找實體靜態檔案，找不到就一律倒給 Laravel 唯一的入口 index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==========================================
    # Laravel Web 首頁/網頁分流區塊
    # https://gary-demo.duckdns.org/
    # ==========================================
    location / {
        # 機制與上方相同：找不到靜態檔案就流向 Laravel
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==========================================
    # PHP-FPM 核心處理區塊（真正執行 PHP 的地方）
    # ==========================================
    # 只要網址結尾是 `.php` 的請求（包含被 try_files 倒過去的 /index.php），都進入此區塊
    location ~ \.php$ {
        # 載入 Nginx 內建的標準 FastCGI 參數設定檔
        include fastcgi_params;

        # 將 PHP 請求透過 FastCGI 協定轉發給名為 `laravel` 的 Docker 容器的 9000 埠
        fastcgi_pass laravel:9000;

        # 告知 php-fpm 預設的 index 檔案名稱
        fastcgi_index index.php;

        # 告訴實體執行 PHP 的容器，要執行的 PHP 檔案絕對路徑是什麼
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ==========================================
    # ASP.NET API 分流區塊
    # https://gary-demo.duckdns.org/api/*
    # ==========================================
    location /api/ {
        # 🔥 補回你原本的關鍵重寫規則：
        # 當精準匹配到 /api/ 或 /api（後面沒接路徑）時，在後台偷偷替換為 /Home/Index
        rewrite ^/api/?$ /Home/Index break;

        # 反向代理：將請求轉發給名為 `aspnet` 的 Docker 容器的 80 埠
        proxy_pass http://aspnet:80;

        # 強制使用 HTTP/1.1 協定，保持連線（Keep-Alive）
        proxy_http_version 1.1;

        # 轉發原始請求的 HTTP Host 標頭（現在會是你的 Domain：gary-demo.duckdns.org）
        proxy_set_header Host $host;

        # 傳遞真實的客戶端 IP 給 ASP.NET
        proxy_set_header X-Real-IP $remote_addr;

        # 傳遞完整的轉發鏈 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 🔥 告知後端 ASP.NET 前端代理使用的是 HTTPS 加密協定
        # 這能避免後端程式在重新導向或產生 URL 時錯誤地產生出不安全的 http:// 網址
        proxy_set_header X-Forwarded-Proto https;
    }

    # ==========================================
    # 安全性設定
    # ==========================================
    # 拒絕所有對開頭為 `.ht` 檔案的存取（如 .htaccess），防止敏感設定檔被下載
    location ~ /\.ht {
        deny all;
    }
}


