server {
    listen 80;
    server_name _;

    index index.php index.html index.htm;

    # ==========================================
    # 1. 優先且強制攔截 Laravel 子路徑 (http://IP/laravel)
    # ==========================================
    location ^~ /laravel {
        # 密技：把 root 設在 /var/www/laravel
        # 當訪問 /laravel/api/users 時，Nginx 會在內部尋找：/var/www/laravel/laravel/api/users
        # 為了讓它對齊 public，我們在後面加上 public 結構
        root /var/www;
        
        # 找不到實體檔案時，一律強制重寫交給進入口 index.php
        try_files $uri $uri/ /laravel/public/index.php?$query_string;

        # 專門處理進入 index.php 的 PHP 請求
        location ~ \.php$ {
            fastcgi_pass laravel:9000;
            include fastcgi_params;
            
            # 精準告訴 Laravel 容器：你的入口就在 /var/www/public/index.php
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # ==========================================
    # 2. 剩下的所有請求，倒給 ASP.NET
    # ==========================================
    location / {
        proxy_pass http://aspnet:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}