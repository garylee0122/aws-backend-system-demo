server {
    listen 80;
    server_name _;

    index index.php index.html index.htm;

    # ==========================================
    # 1. 優先且強制攔截 Laravel 子路徑 (http://IP/laravel)
    # ==========================================
    location ^~ /laravel {
        # 業界最穩防禦：root 設定在 /var/www，網址 /laravel 進入時會組合成 /var/www/laravel
        root /var/www;

        # 關鍵重寫：當找不到靜態檔案時，強行重寫成帶有 public 的實體入口
        try_files $uri $uri/ /laravel/public/index.php?$query_string;

        # 當請求對齊到 index.php 時，在這裡當場吃掉，絕不流向底下的 location /
        location ~ \.php$ {
            fastcgi_pass laravel:9000;
            include fastcgi_params;
            
            # 告訴 Laravel 容器：實體檔案就在你家內部的 /var/www/public/index.php
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # ==========================================
    # 2. 剩下的所有請求，倒給 ASP.NET
    # ==========================================
    location / {
        proxy_pass http://aspnet:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}