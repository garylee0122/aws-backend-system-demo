server {
    listen 80;
    server_name _;

    index index.php index.html index.htm;

    # ==========================================
    # 1. 優先且強制攔截 Laravel 子路徑 (http://IP/laravel)
    # ==========================================
    # 使用 ^~ 強制匹配，絕對不流向底下的 location /
    location ^~ /laravel {
        # 業界小技巧：將 root 設在 /var/www，配合網址 /laravel，Nginx 會完美指向 /var/www/laravel
        root /var/www;
        
        # 進入 Laravel 的 public 目錄尋找靜態檔案，找不到就強行重寫成 /laravel/index.php
        try_files $uri $uri/ /laravel/index.php?$query_string;

        # 只要是 PHP 檔案，就在這裡當場解決，絕不外流
        location ~ \.php$ {
            fastcgi_pass laravel:9000;
            include fastcgi_params;
            
            # 精準對齊 Laravel 容器內的 index.php 實體路徑
            fastcgi_param SCRIPT_FILENAME /var/www/laravel/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # ==========================================
    # 2. 剩下的所有請求，才倒給 ASP.NET
    # ==========================================
    location / {
        proxy_pass http://aspnet:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}