server {
    listen 80;
    server_name _;

    index index.php index.html index.htm;

    # ==========================================
    # 1. 優先且強制攔截 Laravel 子路徑 (http://IP/laravel)
    # ==========================================
    location ^~ /laravel {
        # 使用 alias 直接鎖定 Nginx 容器內的 public 資料夾（結尾一定要有斜線）
        alias /var/www/laravel/public/;
        
        # 【關鍵修正】在 alias 架構下，最後一個參數必須寫成「完整的子路徑/index.php」
        # Nginx 才能正確重寫，而不會跑去根目錄找 index.php
        try_files $uri $uri/ /laravel/index.php?$query_string;

        # 攔截所有 PHP 請求並轉交給 Laravel 容器的 php-fpm
        location ~ \.php$ {
            fastcgi_pass laravel:9000;
            include fastcgi_params;
            
            # 【核心關鍵】告訴 Laravel 容器：實體檔案在 Laravel 容器內的 /var/www/public/index.php
            # 因為 Laravel 容器內的 WORKDIR 是 /var/www，所以它的 index.php 在 /var/www/public/index.php
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            
            # 補足 FastCGI 變數，防止 Laravel 產生錯誤的路由
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # ==========================================
    # 2. 剩下的所有請求，倒給 ASP.NET
    # ==========================================
    location / {
        proxy_pass http://aspnet:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}