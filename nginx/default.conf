server {
    listen 80;
    server_name _;

    index index.php index.html index.htm;

    # ==========================================
    # 1. 優先且強制攔截 Laravel 子路徑 (http://IP/laravel)
    # ==========================================
    location ^~ /laravel {
        # 關鍵修正：將 root 直接指向 public 內，但因為網址帶有 /laravel，
        # Nginx 實際會去找 /var/www/laravel/public 夾帶網址的結構
        root /var/www;
        
        # 修正：找不到實體檔案時，強行導向 /laravel/public/index.php，並交由下面的 PHP 區塊處理
        try_files $uri $uri/ /laravel/public/index.php?$query_string;

        # 只要是 PHP 檔案，就在這裡當場解決
        location ~ \.php$ {
            fastcgi_pass laravel:9000;
            include fastcgi_params;
            
            # 修正：傳遞給 Laravel 容器內部的正確實體 index.php 路徑
            # 因為 Laravel 容器內部的 WORKDIR 是 /var/www，所以它的 index.php 在 /var/www/public/index.php
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # ==========================================
    # 2. 剩下的所有請求，倒給 ASP.NET
    # ==========================================
    location / {
        proxy_pass http://aspnet:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}