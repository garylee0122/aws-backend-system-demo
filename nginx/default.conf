server {
    listen 80;
    server_name _;

    # 確保 Nginx 知道 index 檔案的順序
    index index.php index.html index.htm;

    # ==========================================
    # 1. 優先處理 Laravel 子路徑 (將匹配權限提升)
    # ==========================================
    location ^~ /laravel {
        # 對齊掛載路徑
        alias /var/www/public;
        
        # 如果找不到檔案，就重寫路由丟給 index.php 處理
        try_files $uri $uri/ @laravel;

        # 精準攔截所有 PHP 檔案處理
        location ~ \.php$ {
            fastcgi_pass laravel:9000;
            include fastcgi_params;
            
            # 生產環境標準：因為用了 alias，SCRIPT_FILENAME 必須這樣寫最安全
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # 防止 Nginx 傳遞錯誤的 Method
            fastcgi_intercept_errors on;
        }
    }

    # Laravel 路由重寫處理器
    location @laravel {
        rewrite /laravel/(.*)$ /index.php?$query_string break;
        
        # 轉發給 php-fpm
        fastcgi_pass laravel:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
    }

    # ==========================================
    # 2. 剩下的所有請求，才倒給 ASP.NET
    # ==========================================
    location / {
        proxy_pass http://aspnet:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}