server {
    listen 80;
    server_name _;

    index index.php index.html index.htm;

    # ==========================================
    # 1. 優先且強制攔截 Laravel 子路徑 (http://IP/laravel)
    # ==========================================
    location ^~ /laravel {
        # 直接鎖定 Nginx 容器內部的 public 資料夾
        alias /var/www/laravel/public/;

        # 核心防禦：如果找不到實體檔案（如 CSS/JS），直接在內部重寫成 index.php
        # 結尾加上 break，強制 Nginx 不准重新搜尋全域變數，絕對走不到下方的 ASP.NET
        rewrite ^/laravel/(.*)$ /laravel/index.php?$query_string break;

        # 轉交給 Laravel 容器的 php-fpm
        fastcgi_pass laravel:9000;
        include fastcgi_params;
        
        # 告訴 Laravel 容器：實體檔案就在你家內部的 /var/www/public/index.php
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # ==========================================
    # 2. 剩下的所有請求，倒給 ASP.NET
    # ==========================================
    location / {
        proxy_pass http://aspnet:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}