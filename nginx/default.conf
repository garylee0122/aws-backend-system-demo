server {
    listen 80;
    server_name _;

    # ==========================================
    # 1. 代理 ASP.NET 根目錄 (http://IP/)
    # ==========================================
    location / {
        proxy_pass http://aspnet:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================================
    # 2. 代理 Laravel 子路徑 (http://IP/laravel)
    # ==========================================
    location /laravel {
        # 對齊你在 docker-compose.yml 裡掛載給 nginx 的路徑
        alias /var/www/public;
        index index.php;
        
        # 嘗試尋找實體檔案，找不到就丟給下方的 @laravel 路由處理器
        try_files $uri $uri/ @laravel;

        # 核心：處理所有 .php 結尾的請求，轉發給 php-fpm
        location ~ \.php$ {
            # 這裡透過 Docker 內部網路連接到名為 laravel 的容器，Port 為 9000
            fastcgi_pass laravel:9000;
            include fastcgi_params;
            
            # 必須精準指定容器內部的 index.php 絕對路徑
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # Laravel 的美化路由（URL 重寫）處理器
    location @laravel {
        rewrite /laravel/(.*)$ /index.php?$query_string;
    }
}