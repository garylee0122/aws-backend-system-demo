# 定義一個虛擬主機（Virtual Server）區塊，處理進入這台伺服器的 HTTP 請求
server {
    # 監聽 80 埠（標準的不加密 HTTP 協定埠）
    listen 80;

    # 匹配所有的網域或 IP。底線 `_` 是 Nginx 的萬用符號，
    # 代表當前還沒有綁定特定 Domain 時，這台 EC2 收到任何 IP 請求都會由這個區塊處理。
    server_name _;

    # 設定專案的根目錄（Root Directory）。Nginx 會去這個路徑尋找靜態檔案（如 CSS, JS, 圖片等）。
    # 這裡指向的是 Nginx 容器內部的 Laravel public 資料夾（透過 Docker Compose 共享過來的）。
    root /var/www/public;

    # 當請求的是一個目錄（例如 http://IP/）而非具體檔案時，Nginx 預設會依序尋找並作為首頁讀取的檔案名稱。
    index index.php index.html;

    # =====================================
    # ASP.NET API 分流區塊
    # http://IP/api/*
    # =====================================
    # 路由攔截：只要網址開頭是 http://IP/api/ 的請求（例如 /api/orders），全部進入這個區塊
    location /api/ {
	
	    # 🔥 新增關鍵重寫規則：
        # 當精準匹配到 /api/ 或是 /api/（後面沒有接其他路徑）時，
        # 在後台偷偷將請求網址替換為 /Home/Index，並交給後續的 proxy_pass 處理。
        # `break` 代表重寫完成後直接在當前 location 區塊內往下執行，不再重新匹配其他 location。
        rewrite ^/api/?$ /Home/Index break;

        # 反向代理（Reverse Proxy）：將請求原封不動轉發給名為 `aspnet` 的 Docker 容器的 80 埠
        proxy_pass http://aspnet:80;

        # 強制使用 HTTP/1.1 協定（預設是 1.0）。這對於保持連線（Keep-Alive）非常重要。
        proxy_http_version 1.1;

        # 轉發原始請求的 HTTP Host 標頭（如原本的 IP），防止 ASP.NET 拿到容器內部的域名
        proxy_set_header Host $host;
        
        # 傳遞真實的客戶端 IP 給 ASP.NET。否則 ASP.NET 看到的來源 IP 都會是 Nginx 容器的內部 IP。
        proxy_set_header X-Real-IP $remote_addr;
        
        # 傳遞完整的轉發鏈 IP（包含客戶端 IP 以及途中經過的所有代理伺服器 IP），用於追蹤真實來源
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
	
    # =====================================
    # Laravel API 分流區塊
    # http://IP/laravel-api/*
    # =====================================
    # 路由攔截：只要網址開頭是 http://IP/laravel-api/ 的請求，全部進入這個區塊
    location /laravel-api/ {

        # 嘗試尋找實體檔案：
        # 1. `$uri`  -> 先找看看有沒有這個具體檔案
        # 2. `$uri/` -> 如果找不到檔案，再找看看有沒有這個同名資料夾
        # 3. 如果都找不到（代表是 Laravel 的 API 動態路由），就強行倒給 /index.php，並帶上原本的網址參數（?$query_string）
        # 接著網址會因為變成 /index.php 而流向底下的 PHP-FPM 區塊處理。
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =====================================
    # Laravel Web 首頁/網頁分流區塊
    # http://IP/
    # =====================================
    # 路由攔截：處理根路徑 `/`（即非 /api/ 與 /laravel-api/ 開頭的所有其他請求）
    location / {

        # 機制與上方相同：先找靜態檔案（如 CSS/JS），找不到就一律倒給 Laravel 的唯一入口 index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =====================================
    # PHP-FPM 核心處理區塊（真正執行 PHP 的地方）
    # =====================================
    # 正則表達式匹配：只要網址結尾是 `.php` 的請求（包括剛剛被 try_files 倒過去的 /index.php），都進入此區塊
    location ~ \.php$ {

        # 載入 Nginx 內建的標準 FastCGI 參數設定檔（內含一些像 REQUEST_METHOD 等變數傳遞）
        include fastcgi_params;

        # 將 PHP 請求透過 FastCGI 協定轉發給名為 `laravel` 的 Docker 容器的 9000 埠（php-fpm 預設監聽埠）
        fastcgi_pass laravel:9000;

        # 告知 php-fpm 預設的 index 檔案名稱
        fastcgi_index index.php;

        # 告訴實體執行 PHP 的 `laravel` 容器，要執行的 PHP 檔案絕對路徑是什麼。
        # `$document_root` 就是上面設定的 /var/www/public
        # `$fastcgi_script_name` 就是 /index.php
        # 組合起來就是 `/var/www/public/index.php`，laravel 容器收到後就能順利跑起 Laravel 的生命週期。
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # 安全性設定：拒絕所有對開頭為 `.ht` 檔案的存取
    # 例如 Apache 留下的 `.htaccess` 或 `.htpasswd` 檔案，防止敏感設定檔被外部下載
    location ~ /\.ht {
        deny all;
    }
}