# Older Docker Compose files sometimes used a `version` field.
# Newer Docker Compose versions can infer the syntax version automatically.

services:

  mysql:
    image: mariadb:10.6
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: redis
    restart: always
    #因為在 production，redis 通常不會直接對外開放，所以把 ports 註解
    #ports:
    #- "6379:6379"
    expose:
      - "6379"

  laravel:
    build:
      context: ./laravel
    container_name: laravel
    restart: always
    working_dir: /var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis

  aspnet:
    build:
      context: ./aspnet
    container_name: aspnet
    restart: always
    expose:
      - "80"
    volumes:
      - ./aspnet/logs:/app/logs
    environment:
      # true 表示要把 order worker 打開，false 表示要關
      ENABLE_ORDER_WORKER: "true"
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - aspnet
	  
volumes:
  mysql_data: